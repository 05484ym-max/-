<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>BLACK PHONE | בלאק פון</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ⚙️  אזור עריכה מהירה — שנה כאן צבעים, שם החנות ופרטי קשר
   ============================================================ */
:root{
  --deep-blue:#050b1f;      /* רקע ראשי כהה */
  --royal-blue:#0d1f4d;     /* כחול עמוק יוקרתי */
  --royal-blue-2:#123072;   /* כחול משני */
  --accent-gold:#c9a24b;    /* זהב - מבטא יוקרה */
  --accent-gold-soft:#e8cd8a;
  --glass-bg:rgba(255,255,255,0.055);
  --glass-border:rgba(255,255,255,0.14);
  --glass-border-hi:rgba(201,162,75,0.55);
  --text-main:#f4f6fb;
  --text-dim:#a8b3cc;
  --radius:22px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Heebo',sans-serif;
  background:
    radial-gradient(ellipse 90% 60% at 15% -10%, rgba(30,70,180,0.35), transparent 60%),
    radial-gradient(ellipse 80% 50% at 100% 0%, rgba(201,162,75,0.10), transparent 55%),
    linear-gradient(160deg, var(--deep-blue) 0%, var(--royal-blue) 55%, #081332 100%);
  background-attachment:fixed;
  color:var(--text-main);
  min-height:100vh;
  overflow-x:hidden;
}
/* רקע זכוכית מתנועע */
body::before{
  content:"";
  position:fixed; inset:-20%;
  background:
    radial-gradient(circle at 20% 30%, rgba(80,120,255,0.18), transparent 40%),
    radial-gradient(circle at 85% 70%, rgba(201,162,75,0.12), transparent 40%);
  filter:blur(60px);
  animation:drift 18s ease-in-out infinite alternate;
  pointer-events:none; z-index:0;
}
@keyframes drift{
  0%{transform:translate(0,0) rotate(0deg);}
  100%{transform:translate(3%,4%) rotate(6deg);}
}
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(22px) saturate(140%);
  -webkit-backdrop-filter:blur(22px) saturate(140%);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
}

/* ===== Header ===== */
header{
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 22px;
  background:rgba(5,11,31,0.55);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--glass-border);
}
.logo{
  display:flex; align-items:center; gap:10px;
  font-family:'Cormorant Garamond',serif;
  font-weight:600; font-size:1.6rem; letter-spacing:1px;
  cursor:pointer;
}
.logo .dot{
  width:10px; height:10px; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, var(--accent-gold-soft), var(--accent-gold) 70%);
  box-shadow:0 0 12px var(--accent-gold);
}
.logo b{color:var(--accent-gold-soft); font-weight:600;}
.back-btn{
  display:none; align-items:center; gap:6px;
  color:var(--text-dim); background:none; border:1px solid var(--glass-border);
  padding:8px 16px; border-radius:30px; cursor:pointer; font-size:.85rem;
  font-family:'Heebo',sans-serif; transition:.25s;
}
.back-btn:hover{border-color:var(--accent-gold); color:var(--accent-gold-soft);}

main{position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:26px 18px 80px;}

/* ===== Hero ===== */
.hero{ text-align:center; padding:38px 10px 46px; }
.hero .eyebrow{
  font-size:.78rem; letter-spacing:4px; color:var(--accent-gold-soft);
  text-transform:uppercase; margin-bottom:14px; opacity:.85;
}
.hero h1{
  font-family:'Cormorant Garamond',serif; font-weight:600;
  font-size:clamp(2.2rem, 6vw, 3.6rem);
  background:linear-gradient(90deg,#fff, var(--accent-gold-soft) 60%, #fff);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  margin-bottom:12px;
}
.hero p{color:var(--text-dim); font-size:1rem; max-width:480px; margin:0 auto;}

/* ===== Category Grid (home) ===== */
.grid{
  display:grid; grid-template-columns:repeat(2,1fr); gap:18px; margin-top:10px;
}
@media(min-width:640px){ .grid{grid-template-columns:repeat(4,1fr); gap:22px;} }

.cat-card{
  position:relative; aspect-ratio:1/1.05; padding:22px;
  display:flex; flex-direction:column; justify-content:flex-end;
  cursor:pointer; overflow:hidden;
  transition:transform .35s cubic-bezier(.2,.8,.2,1), border-color .35s, box-shadow .35s;
}
.cat-card:hover, .cat-card:active{
  transform:translateY(-6px) scale(1.015);
  border-color:var(--glass-border-hi);
  box-shadow:0 20px 45px rgba(0,0,0,0.45), 0 0 0 1px rgba(201,162,75,0.25);
}
.cat-card .icon{
  font-size:2.1rem; position:absolute; top:20px; left:20px; opacity:.9;
  filter:drop-shadow(0 0 10px rgba(201,162,75,0.35));
}
.cat-card .shine{
  position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.10), transparent 45%);
  pointer-events:none;
}
.cat-card h3{
  font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:600; margin-bottom:4px;
}
.cat-card span{ font-size:.78rem; color:var(--text-dim); }

/* ===== Products view ===== */
#products-view{ display:none; }
.section-title{
  font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:600;
  margin-bottom:22px; color:var(--accent-gold-soft);
}
.product-grid{
  display:grid; grid-template-columns:repeat(2,1fr); gap:16px;
}
@media(min-width:640px){ .product-grid{grid-template-columns:repeat(3,1fr); gap:20px;} }
@media(min-width:960px){ .product-grid{grid-template-columns:repeat(4,1fr);} }

.product-card{
  padding:18px; cursor:pointer; text-align:center;
  transition:transform .3s, border-color .3s;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.product-card:hover{ transform:translateY(-4px); border-color:var(--glass-border-hi); }
.product-card .thumb{
  width:100%; aspect-ratio:1/1; border-radius:14px;
  background:linear-gradient(150deg, var(--royal-blue-2), var(--deep-blue));
  display:flex; align-items:center; justify-content:center; font-size:2.2rem;
  border:1px solid var(--glass-border);
  overflow:hidden;
}
.product-card .thumb img, .modal .thumb-lg img{
  width:100%; height:100%; object-fit:cover; border-radius:inherit;
}
.product-card h4{ font-size:.95rem; font-weight:500; }
.product-card .price{ color:var(--accent-gold-soft); font-weight:700; font-size:.95rem; }

/* ===== Modal ===== */
.overlay{
  position:fixed; inset:0; background:rgba(2,6,18,0.65);
  backdrop-filter:blur(6px); z-index:100;
  display:none; align-items:flex-end; justify-content:center;
}
@media(min-width:640px){ .overlay{align-items:center;} }
.overlay.open{ display:flex; animation:fadeIn .25s; }
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}

.modal{
  width:100%; max-width:460px; max-height:88vh; overflow-y:auto;
  padding:26px 24px 30px;
  border-radius:26px 26px 0 0;
  transform:translateY(100%);
  animation:slideUp .35s cubic-bezier(.2,.8,.2,1) forwards;
  background:linear-gradient(165deg, rgba(18,48,114,0.65), rgba(5,11,31,0.9));
}
@media(min-width:640px){
  .modal{ border-radius:26px; transform:translateY(20px); }
}
@keyframes slideUp{ to{ transform:translateY(0); } }

.modal-handle{
  width:40px; height:4px; border-radius:4px; background:var(--glass-border);
  margin:0 auto 18px;
}
.modal .thumb-lg{
  width:100%; aspect-ratio:16/10; border-radius:16px; margin-bottom:18px;
  background:linear-gradient(150deg, var(--royal-blue-2), var(--deep-blue));
  display:flex; align-items:center; justify-content:center; font-size:3.4rem;
  border:1px solid var(--glass-border);
  overflow:hidden;
}
.modal h2{ font-family:'Cormorant Garamond',serif; font-size:1.7rem; margin-bottom:4px; }
.modal .modal-price{ color:var(--accent-gold-soft); font-size:1.4rem; font-weight:700; margin-bottom:16px; }
.spec-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:22px; }
.spec-row{
  display:flex; justify-content:space-between; font-size:.88rem;
  padding-bottom:9px; border-bottom:1px dashed var(--glass-border); color:var(--text-dim);
}
.spec-row b{ color:var(--text-main); font-weight:500; }
.close-btn, .cta-btn{
  width:100%; padding:14px; border-radius:14px; border:none;
  font-family:'Heebo',sans-serif; font-size:.95rem; cursor:pointer; font-weight:700;
}
.cta-btn{
  background:linear-gradient(100deg, var(--accent-gold), var(--accent-gold-soft));
  color:#1a1204; margin-bottom:10px; transition:filter .2s;
}
.cta-btn:hover{ filter:brightness(1.08); }
.close-btn{ background:rgba(255,255,255,0.06); color:var(--text-dim); border:1px solid var(--glass-border); }

footer{ text-align:center; padding:30px 10px; color:var(--text-dim); font-size:.8rem; position:relative; z-index:1; }
footer b{ color:var(--accent-gold-soft); }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()"><span class="dot"></span>BLACK<b>PHONE</b></div>
  <button class="back-btn" id="backBtn" onclick="goHome()">← חזרה לדף הראשי</button>
</header>

<main>
  <section id="home-view">
    <div class="hero">
      <div class="eyebrow">Premium Mobile Store</div>
      <h1>בלאק פון</h1>
      <p>המקום שלכם למכשירים, תיקונים ואבזרים ברמה הכי גבוהה</p>
    </div>
    <div class="grid" id="catGrid"></div>
  </section>

  <section id="products-view">
    <h2 class="section-title" id="prodTitle"></h2>
    <div class="product-grid" id="prodGrid"></div>
  </section>
</main>

<footer>© <span id="year"></span> <b>BLACK PHONE</b> · כל הזכויות שמורות</footer>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal glass" id="modalBox"></div>
</div>

<script>
// ⚙️ מספר הוואטסאפ של החנות - כתבו כאן עם קידומת מדינה, בלי + ובלי אפסים מובילים
// לדוגמה: מספר ישראלי 050-123-4567 → יש לכתוב 972501234567
const WHATSAPP_NUMBER = "972500000000"; // 👈 שנו למספר האמיתי שלכם
</script>
<script src="products.js"></script>
<script>
// מחזיר HTML לתצוגת תמונה/אייקון של מוצר — אם יש img מוצגת תמונה, אחרת אמוג׳י
function thumbContent(p){
  return p.img ? `<img src="${p.img}" alt="${p.name}" onerror="this.parentElement.innerHTML='${p.icon||'📦'}'">` : (p.icon||'📦');
}

document.getElementById('year').textContent = new Date().getFullYear();

// ---------- render categories ----------
const catGrid = document.getElementById('catGrid');
CATEGORIES.forEach(c=>{
  const el = document.createElement('div');
  el.className = 'cat-card glass';
  el.onclick = ()=>openCategory(c.id, c.title);
  el.innerHTML = `<div class="shine"></div><div class="icon">${c.icon}</div><h3>${c.title}</h3><span>${c.sub}</span>`;
  catGrid.appendChild(el);
});

function openCategory(id, title){
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('products-view').style.display = 'block';
  document.getElementById('backBtn').style.display = 'flex';
  document.getElementById('prodTitle').textContent = title;
  const grid = document.getElementById('prodGrid');
  grid.innerHTML = '';
  (PRODUCTS[id]||[]).forEach(p=>{
    const el = document.createElement('div');
    el.className = 'product-card glass';
    el.onclick = ()=>openModal(p);
    el.innerHTML = `<div class="thumb">${thumbContent(p)}</div><h4>${p.name}</h4><div class="price">₪${p.price.toLocaleString()}</div>`;
    grid.appendChild(el);
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

function goHome(){
  document.getElementById('home-view').style.display = 'block';
  document.getElementById('products-view').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  window.scrollTo({top:0, behavior:'smooth'});
}

function openModal(p){
  const box = document.getElementById('modalBox');
  box.innerHTML = `
    <div class="modal-handle"></div>
    <div class="thumb-lg">${thumbContent(p)}</div>
    <h2>${p.name}</h2>
    <div class="modal-price">₪${p.price.toLocaleString()}</div>
    <div class="spec-list">
      ${p.specs.map(s=>`<div class="spec-row"><span>${s[0]}</span><b>${s[1]}</b></div>`).join('')}
    </div>
    <button class="cta-btn" onclick="sendToWhatsapp('${p.name.replace(/'/g,"\\'")}', ${p.price})">לבירור ויצירת קשר</button>
    <button class="close-btn" onclick="closeModal()">סגירה</button>
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function sendToWhatsapp(name, price){
  const msg = `שלום! אני מעוניין/ת לקבל פרטים על: ${name} (₪${price.toLocaleString()})`;
  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
</script>
</body>
</html>
