<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>BLACK PHONE | בלאק פון</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ⚙️  אזור עריכה מהירה — שנה כאן צבעים, שם החנות ופרטי קשר
   ============================================================ */
:root{
  --deep-blue:#020d17;      /* רקע ראשי כהה - כמעט שחור-תכלת */
  --royal-blue:#0c3450;     /* תכלת עמוק יוקרתי */
  --royal-blue-2:#175a80;   /* תכלת-כחול משני, בהיר יותר */
  --accent-gold:#9c7a2e;    /* זהב עמוק ומתכתי - לא צהוב */
  --accent-gold-soft:#d9b45c;
  --accent-gold-shine:#fbeecb; /* ברק זהב חם לגימור מתכתי */
  --accent-ice:#8fd3e8;     /* נגיעת תכלת-קרח לברק עדין */
  --glass-bg:rgba(255,255,255,0.055);
  --glass-border:rgba(255,255,255,0.14);
  --glass-border-hi:rgba(156,122,46,0.55);
  --text-main:#f4f6fb;
  --text-dim:#a8b3cc;
  --radius:22px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Heebo',sans-serif;
  background:
    radial-gradient(ellipse 90% 60% at 15% -10%, rgba(40,140,190,0.28), transparent 60%),
    radial-gradient(ellipse 80% 50% at 100% 0%, rgba(156,122,46,0.10), transparent 55%),
    linear-gradient(160deg, var(--deep-blue) 0%, var(--royal-blue) 55%, #061d2e 100%);
  background-attachment:fixed;
  color:var(--text-main);
  min-height:100vh;
  overflow-x:hidden;
}
/* רקע זכוכית מתנועע */
body::before{
  content:"";
  position:fixed; inset:-20%;
  background:
    radial-gradient(circle at 20% 30%, rgba(90,190,220,0.16), transparent 40%),
    radial-gradient(circle at 85% 70%, rgba(156,122,46,0.12), transparent 40%);
  filter:blur(60px);
  animation:drift 18s ease-in-out infinite alternate;
  pointer-events:none; z-index:0;
}
@keyframes drift{
  0%{transform:translate(0,0) rotate(0deg);}
  100%{transform:translate(3%,4%) rotate(6deg);}
}
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(22px) saturate(140%);
  -webkit-backdrop-filter:blur(22px) saturate(140%);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
}

.logo{
  display:inline-flex; align-items:baseline; justify-content:center;
  font-family:'Cormorant Garamond', serif;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(100deg, var(--accent-gold) 0%, var(--accent-gold-soft) 20%, var(--accent-gold-shine) 40%, var(--accent-gold-soft) 58%, var(--accent-gold) 75%, #7a5e22 88%, var(--accent-gold-soft) 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,0.35)) drop-shadow(0 0 20px rgba(156,122,46,0.35));
}
.logo .cap{ font-size:3.6rem; line-height:1; }
.logo .small{ font-size:1.7rem; letter-spacing:2px; font-weight:500; }
.logo .gap{ width:.28em; display:inline-block; }
.back-btn{
  display:inline-flex; align-items:center; gap:6px;
  color:var(--accent-gold-soft); background:rgba(255,255,255,0.04);
  border:1px solid rgba(156,122,46,0.3);
  padding:8px 18px; border-radius:30px; cursor:pointer; font-size:.85rem;
  font-family:'Heebo',sans-serif; transition:.25s; margin-bottom:18px;
}
.back-btn:hover{ border-color:var(--accent-gold); background:rgba(156,122,46,0.1); }

main{position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:26px 18px 80px;}

/* ===== Hero ===== */
.hero{ text-align:center; padding:58px 10px 46px; }
.hero .logo{ margin-bottom:16px; }
.hero p{color:var(--text-dim); font-size:1rem; max-width:480px; margin:0 auto;}

/* ===== Category Grid (home) ===== */
.grid{
  display:grid; grid-template-columns:repeat(2,1fr); gap:18px; margin-top:10px;
}
@media(min-width:640px){ .grid{grid-template-columns:repeat(4,1fr); gap:22px;} }

.cat-card{
  position:relative; aspect-ratio:1/1.05; padding:22px;
  display:flex; flex-direction:column; justify-content:flex-end;
  cursor:pointer; overflow:hidden;
  transition:transform .35s cubic-bezier(.2,.8,.2,1), border-color .35s, box-shadow .35s;
}
.cat-card:hover, .cat-card:active{
  transform:translateY(-6px) scale(1.015);
  border-color:var(--glass-border-hi);
  box-shadow:0 20px 45px rgba(0,0,0,0.45), 0 0 0 1px rgba(156,122,46,0.25);
}
.cat-card .icon{
  position:absolute; top:20px; left:20px; opacity:.95;
  filter:drop-shadow(0 0 10px rgba(156,122,46,0.35));
}
.cat-card .icon svg{ width:32px; height:32px; stroke:var(--accent-gold-soft); fill:none; stroke-width:1.2; }
.cat-photo{
  position:absolute; inset:0; background-size:cover; background-position:center;
  transition:transform .5s cubic-bezier(.2,.8,.2,1);
}
.cat-card:hover .cat-photo{ transform:scale(1.07); }
.cat-overlay{
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(2,13,23,0.05) 0%, rgba(2,13,23,0.55) 55%, rgba(2,13,23,0.93) 100%);
}
.cat-card .shine{
  position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.10), transparent 45%);
  pointer-events:none;
}
.cat-card h3, .cat-card span{ position:relative; z-index:2; }
.cat-card h3{
  font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:600; margin-bottom:4px;
}
.cat-card span{ font-size:.78rem; color:var(--text-dim); }

/* ===== Products view ===== */
#products-view{ display:none; }
.section-title{
  font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:600;
  margin-bottom:22px; color:var(--accent-gold-soft);
}
.product-grid{
  display:grid; grid-template-columns:repeat(2,1fr); gap:16px;
}
@media(min-width:640px){ .product-grid{grid-template-columns:repeat(3,1fr); gap:20px;} }
@media(min-width:960px){ .product-grid{grid-template-columns:repeat(4,1fr);} }

.product-card{
  padding:18px; cursor:pointer; text-align:center;
  transition:transform .3s, border-color .3s;
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.product-card:hover{ transform:translateY(-4px); border-color:var(--glass-border-hi); }
.product-card .thumb{
  width:100%; aspect-ratio:1/1; border-radius:14px;
  background:linear-gradient(150deg, var(--royal-blue-2), var(--deep-blue));
  display:flex; align-items:center; justify-content:center;
  border:1px solid var(--glass-border);
  overflow:hidden;
}
.product-card .thumb img, .modal .thumb-lg img{
  width:100%; height:100%; object-fit:cover; border-radius:inherit;
}
.thumb svg, .thumb-lg svg{ width:34%; height:34%; stroke:var(--accent-gold-soft); fill:none; stroke-width:1; opacity:.6; }
.modal .thumb-lg svg{ width:22%; height:22%; }
.product-card h4{ font-size:.95rem; font-weight:500; }
.product-card .price{ color:var(--accent-gold-soft); font-weight:700; font-size:.95rem; }

/* ===== Modal ===== */
.overlay{
  position:fixed; inset:0; background:rgba(2,6,18,0.65);
  backdrop-filter:blur(6px); z-index:100;
  display:none; align-items:flex-end; justify-content:center;
}
@media(min-width:640px){ .overlay{align-items:center;} }
.overlay.open{ display:flex; animation:fadeIn .25s; }
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}

.modal{
  width:100%; max-width:460px; max-height:88vh; overflow-y:auto;
  padding:26px 24px 30px;
  border-radius:26px 26px 0 0;
  transform:translateY(100%);
  animation:slideUp .35s cubic-bezier(.2,.8,.2,1) forwards;
  background:linear-gradient(165deg, rgba(21,80,120,0.55), rgba(2,13,23,0.92));
}
@media(min-width:640px){
  .modal{ border-radius:26px; transform:translateY(20px); }
}
@keyframes slideUp{ to{ transform:translateY(0); } }

.modal-handle{
  width:40px; height:4px; border-radius:4px; background:var(--glass-border);
  margin:0 auto 18px;
}
.modal .thumb-lg{
  width:100%; aspect-ratio:16/10; border-radius:16px; margin-bottom:18px;
  background:linear-gradient(150deg, var(--royal-blue-2), var(--deep-blue));
  display:flex; align-items:center; justify-content:center;
  border:1px solid var(--glass-border);
  overflow:hidden;
}
.modal h2{ font-family:'Cormorant Garamond',serif; font-size:1.7rem; margin-bottom:4px; }
.modal .modal-price{ color:var(--accent-gold-soft); font-size:1.4rem; font-weight:700; margin-bottom:16px; }
.spec-list{ display:flex; flex-direction:column; gap:10px; margin-bottom:22px; }
.spec-row{
  display:flex; justify-content:space-between; font-size:.88rem;
  padding-bottom:9px; border-bottom:1px dashed var(--glass-border); color:var(--text-dim);
}
.spec-row b{ color:var(--text-main); font-weight:500; }
.close-btn, .cta-btn{
  width:100%; padding:14px; border-radius:14px; border:none;
  font-family:'Heebo',sans-serif; font-size:.95rem; cursor:pointer; font-weight:700;
}
.cta-btn{
  background:linear-gradient(100deg, var(--accent-gold), var(--accent-gold-soft));
  color:#1a1204; margin-bottom:10px; transition:filter .2s;
}
.cta-btn:hover{ filter:brightness(1.08); }
.close-btn{ background:rgba(255,255,255,0.06); color:var(--text-dim); border:1px solid var(--glass-border); }

footer{ text-align:center; padding:30px 10px; color:var(--text-dim); font-size:.8rem; position:relative; z-index:1; }
footer b{ color:var(--accent-gold-soft); }
</style>
</head>
<body>

<!-- אייקוני קו יוקרתיים - עיצוב מקורי, ללא אימוג'ים -->
<svg style="display:none" aria-hidden="true">
  <symbol id="icon-tool" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="5.5" height="5.5" rx="1"></rect>
    <line x1="8.2" y1="8.2" x2="20" y2="20"></line>
    <line x1="16.5" y1="16.5" x2="20" y2="20"></line>
  </symbol>
  <symbol id="icon-phone" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
    <rect x="7" y="2" width="10" height="20" rx="2.2"></rect>
    <line x1="10.5" y1="18.3" x2="13.5" y2="18.3"></line>
  </symbol>
  <symbol id="icon-headphones" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 15v-3a8 8 0 0 1 16 0v3"></path>
    <rect x="2" y="15" width="4.2" height="6" rx="1.8"></rect>
    <rect x="17.8" y="15" width="4.2" height="6" rx="1.8"></rect>
  </symbol>
  <symbol id="icon-seal" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"></circle>
    <path d="M7.8 12.2l2.8 2.8 5.6-6.4"></path>
  </symbol>
  <symbol id="icon-gem" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3 3 9l9 12 9-12z"></path>
    <path d="M3 9h18"></path>
    <path d="M9 3l3 6 3-6"></path>
  </symbol>
  <symbol id="icon-placeholder" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
    <circle cx="8.7" cy="10.3" r="1.4"></circle>
    <path d="M21 16l-5.2-5.2-4 4-3-3L3 17"></path>
  </symbol>
</svg>

<main>
  <section id="home-view">
    <div class="hero">
      <div class="logo" onclick="goHome()"><span class="cap">B</span><span class="small">lack</span><span class="gap"></span><span class="cap">P</span><span class="small">hone</span></div>
      <p>המקום שלכם למכשירים, תיקונים ואבזרים ברמה הכי גבוהה</p>
    </div>
    <div class="grid" id="catGrid"></div>
  </section>

  <section id="products-view">
    <button class="back-btn" id="backBtn" onclick="goHome()">← חזרה לדף הבית</button>
    <h2 class="section-title" id="prodTitle"></h2>
    <div class="product-grid" id="prodGrid"></div>
  </section>
</main>

<footer>© <span id="year"></span> <b>BLACK PHONE</b> · כל הזכויות שמורות</footer>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal glass" id="modalBox"></div>
</div>

<script>
// ⚙️ מספר הוואטסאפ של החנות - כתבו כאן עם קידומת מדינה, בלי + ובלי אפסים מובילים
// לדוגמה: מספר ישראלי 050-123-4567 → יש לכתוב 972501234567
const WHATSAPP_NUMBER = "972500000000"; // 👈 שנו למספר האמיתי שלכם
</script>
<script src="products.js"></script>
<script>
// מזהה SVG לכל קטגוריה - אפשר להוסיף התאמות לקטגוריות חדשות כאן
const CATEGORY_ICONS = { lab:'icon-tool', products:'icon-phone', accessories:'icon-headphones', kosher:'icon-seal' };
function categoryIcon(id){ return CATEGORY_ICONS[id] || 'icon-gem'; }

// מחזיר HTML לתצוגת תמונה של מוצר — אם יש img מוצגת תמונה, אחרת אייקון תמונה אלגנטי
function thumbContent(p){
  return p.img
    ? `<img src="${p.img}" alt="${p.name}" onerror="this.parentElement.innerHTML='<svg><use href=&quot;#icon-placeholder&quot;></use></svg>'">`
    : `<svg><use href="#icon-placeholder"></use></svg>`;
}

document.getElementById('year').textContent = new Date().getFullYear();

// ---------- render categories ----------
const catGrid = document.getElementById('catGrid');
CATEGORIES.forEach(c=>{
  const el = document.createElement('div');
  el.className = 'cat-card glass';
  el.onclick = ()=>openCategory(c.id, c.title);
  const visual = c.img
    ? `<div class="cat-photo" style="background-image:url('${c.img.replace(/'/g,"\\'")}')"></div><div class="cat-overlay"></div>`
    : `<div class="shine"></div><div class="icon"><svg><use href="#${categoryIcon(c.id)}"></use></svg></div>`;
  el.innerHTML = `${visual}<h3>${c.title}</h3><span>${c.sub}</span>`;
  catGrid.appendChild(el);
});

function openCategory(id, title){
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('products-view').style.display = 'block';
  document.getElementById('backBtn').style.display = 'flex';
  document.getElementById('prodTitle').textContent = title;
  const grid = document.getElementById('prodGrid');
  grid.innerHTML = '';
  (PRODUCTS[id]||[]).forEach(p=>{
    const el = document.createElement('div');
    el.className = 'product-card glass';
    el.onclick = ()=>openModal(p);
    el.innerHTML = `<div class="thumb">${thumbContent(p)}</div><h4>${p.name}</h4><div class="price">₪${p.price.toLocaleString()}</div>`;
    grid.appendChild(el);
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

function goHome(){
  document.getElementById('home-view').style.display = 'block';
  document.getElementById('products-view').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  window.scrollTo({top:0, behavior:'smooth'});
}

function openModal(p){
  const box = document.getElementById('modalBox');
  box.innerHTML = `
    <div class="modal-handle"></div>
    <div class="thumb-lg">${thumbContent(p)}</div>
    <h2>${p.name}</h2>
    <div class="modal-price">₪${p.price.toLocaleString()}</div>
    <div class="spec-list">
      ${p.specs.map(s=>`<div class="spec-row"><span>${s[0]}</span><b>${s[1]}</b></div>`).join('')}
    </div>
    <button class="cta-btn" onclick="sendToWhatsapp('${p.name.replace(/'/g,"\\'")}', ${p.price})">לבירור ויצירת קשר</button>
    <button class="close-btn" onclick="closeModal()">סגירה</button>
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function sendToWhatsapp(name, price){
  const msg = `שלום! אני מעוניין/ת לקבל פרטים על: ${name} (₪${price.toLocaleString()})`;
  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
</script>
</body>
</html>
